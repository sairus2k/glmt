sonar.projectKey=sairus2k_glmt
sonar.organization=sairus2k
sonar.go.coverage.reportPaths=coverage.out
sonar.coverage.exclusions=**/*_test.go,**/demo/**,cmd/glmt/demo.go
sonar.exclusions=**/mock_*.go,**/testdata/**

# Ignore issues on multiple criteria
sonar.issue.ignore.multicriteria=e1,e2,e3,e4
# Test functions often use unconventional names (e.g. snake_case for subtests)
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S100
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*_test.go
# Duplicated string literals are normal in table-driven tests
sonar.issue.ignore.multicriteria.e2.ruleKey=go:S1192
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*_test.go
# Empty function stubs are intentional no-ops in test mocks/callbacks
sonar.issue.ignore.multicriteria.e3.ruleKey=go:S1186
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*_test.go
# Table-driven tests naturally have high cognitive complexity
sonar.issue.ignore.multicriteria.e4.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*_test.go

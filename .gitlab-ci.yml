stages:
  - lint
  - test
  - build

lint:
  stage: lint
  image: golang:1.26
  script:
    - go vet ./...
    - test -z "$(gofmt -l .)"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:
  stage: test
  image: golang:1.26
  script:
    - go test ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build:
  stage: build
  image: golang:1.26
  script:
    - go build -o glmt ./cmd/glmt
  artifacts:
    paths:
      - glmt
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
